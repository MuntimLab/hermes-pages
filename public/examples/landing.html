<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пример статичной страницы</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b1020; color: #f8fafc; font-family: system-ui, sans-serif; }
    section { width: min(760px, calc(100% - 40px)); padding: 48px; border-radius: 28px; background: linear-gradient(135deg, rgba(99,102,241,.25), rgba(14,165,233,.12)); border: 1px solid rgba(255,255,255,.14); }
    h1 { font-size: clamp(36px, 6vw, 72px); line-height: .95; margin: 0 0 18px; letter-spacing: -.06em; }
    p { color: #cbd5e1; font-size: 20px; line-height: 1.6; }
  </style>
</head>
<body>
  <section>
    <h1>Одноразовый лендинг за пару минут</h1>
    <p>Сюда можно быстро складывать простые HTML-страницы: промо, прототипы, списки, визуальные эксперименты.</p>
  </section>
</body>
</html>
